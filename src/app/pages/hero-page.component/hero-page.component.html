<div class="min-h-[60vh] flex flex-col items-center justify-center p-4">
  <div class="card w-full max-w-2xl bg-base-200/40 backdrop-blur-xl shadow-2xl border border-base-content/10 relative overflow-hidden rounded-3xl p-8 md:p-12 transition-all hover:shadow-primary/10 hover:border-primary/30 group">
    
    <!-- Decorative background glow -->
    <div class="absolute -top-24 -left-24 w-48 h-48 bg-primary/20 rounded-full blur-3xl group-hover:bg-primary/30 transition-all duration-700"></div>
    <div class="absolute -bottom-24 -right-24 w-48 h-48 bg-accent/20 rounded-full blur-3xl group-hover:bg-accent/30 transition-all duration-700"></div>

    <div class="card-body items-center text-center relative z-10 p-0">
      <!-- Icon/Shield representation -->
      <div class="w-20 h-20 rounded-full bg-gradient-to-tr from-primary to-accent flex items-center justify-center shadow-lg shadow-primary/20 mb-6 animate-pulse">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-10 h-10 text-primary-content">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12c0 1.268-.63 2.39-1.593 3.068a3.745 3.745 0 0 1-1.043 3.296 3.745 3.745 0 0 1-3.296 1.043A3.745 3.745 0 0 1 12 21c-1.268 0-2.39-.63-3.068-1.593a3.746 3.746 0 0 1-3.296-1.043 3.745 3.745 0 0 1-1.043-3.296A3.745 3.745 0 0 1 3 12c0-1.268.63-2.39 1.593-3.068a3.745 3.745 0 0 1 1.043-3.296 3.746 3.746 0 0 1 3.296-1.043A3.746 3.746 0 0 1 12 3c1.268 0 2.39.63 3.068 1.593a3.746 3.746 0 0 1 3.296 1.043 3.746 3.746 0 0 1 1.043 3.296A3.745 3.745 0 0 1 21 12Z" />
        </svg>
      </div>

      <!-- Super Hero Label -->
      <span class="text-xs uppercase tracking-widest font-semibold text-secondary/80 bg-secondary/10 px-3 py-1 rounded-full mb-4">
        Perfil del Superhéroe
      </span>

      <!-- Super Hero Name (Big, beautiful gradient) -->
      <h1 class="text-5xl md:text-7xl font-black bg-gradient-to-r from-primary via-secondary to-accent bg-clip-text text-transparent tracking-tight drop-shadow-sm select-none py-2 leading-none">
        {{ name() }}
      </h1>

      <p class="text-base-content/60 mt-4 max-w-md text-sm md:text-base">
        Visualización de detalles en tiempo real. Este superhéroe está registrado activamente en la base de datos de tu aplicación Angular.
      </p>

      <div class="card-actions justify-center mt-10 w-full">
        <a routerLink="/custom" class="btn btn-primary btn-wide rounded-2xl gap-2 hover:scale-102 hover:shadow-lg hover:shadow-primary/20 transition-all duration-300">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4 h-4">
            <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18" />
          </svg>
          Volver a Pipes Personalizados
        </a>
      </div>
    </div>
  </div>
</div>
